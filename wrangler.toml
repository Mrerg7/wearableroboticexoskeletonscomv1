name = "wearableroboticexoskeletons-com"
main = "src/worker.ts"
compatibility_date = "2026-06-01"

[[routes]]
pattern = "wearableroboticexoskeletons.com"
custom_domain = true

[[routes]]
pattern = "www.wearableroboticexoskeletons.com"
custom_domain = true

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
html_handling = "force-trailing-slash"
not_found_handling = "404-page"

[vars]
SITE_URL = "https://wearableroboticexoskeletons.com"
